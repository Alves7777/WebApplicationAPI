version: '3.8'
services:
  financial-sqlserver:
    container_name: financial-sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    networks:
      - appnet
    restart: unless-stopped

  backend:
    build:
      context: ./WebApplicationAPI
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=financial-sqlserver;Database=FinancialControl;User=SA;Password=YourStrong!Passw0rd;
    ports:
      - "5000:80"
    depends_on:
      - financial-sqlserver
    networks:
      - appnet
    restart: unless-stopped

  frontend:
    build:
      context: ./FinancialControlUI
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5001:80"
    depends_on:
      - backend
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge
